<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Editor de Banner Mobile</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
}

.galeria img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    border: 3px solid transparent;
    background: white;
}

.galeria img.selecionada {
    border-color: #c9adfa;
}

.painel {
    max-width: 400px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.button {
    width: 100%;
    padding: 14px;
    background: #c9adfa;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.tabela-wrap {
    margin-top: 40px;
    background: white;
    padding: 20px;
    border-radius: 14px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

td img {
    width: 120px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
}

.btn {
    padding: 6px 10px;
    margin: 2px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.remover {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<h1>Editor de Banner Mobile</h1>

<div class="galeria" id="galeria"></div>

<div class="painel">
    <button onclick="salvarBanner()">Adicionar banner</button>
</div>

<div class="tabela-wrap">

    <h2>Banners Mobile</h2>

    <table>
        <thead>
            <tr>
                <th>Imagem</th>
                <th>Ordem</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="tabela"></tbody>
    </table>

</div>

<script>
let selecionado = "";

// =============================
// CARREGAR IMAGENS DA PASTA
// =============================
async function carregarGaleria() {

    const res = await fetch("/api/banners-cel");
    const imagens = await res.json();

    const galeria = document.getElementById("galeria");

    imagens.forEach(nome => {

        const img = document.createElement("img");

        img.src = `/bannercel/${nome}`;

        img.onclick = () => {

            document.querySelectorAll(".galeria img")
                .forEach(i => i.classList.remove("selecionada"));

            img.classList.add("selecionada");

            selecionado = nome;
        };

        galeria.appendChild(img);
    });
}

// =============================
// SALVAR NO INDEX
// =============================
async function salvarBanner() {

    if (!selecionado) {
        alert("Selecione um banner!");
        return;
    }

    const res = await fetch("/salvar-banner-cel", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            imagem: selecionado
        })
    });

    const data = await res.json();

    if (data.sucesso) {
        alert("Banner adicionado!");
        carregarTabela();
    }
}

// =============================
// CARREGAR TABELA
// =============================
async function carregarTabela() {

    const res = await fetch("/api/banners-cadastrados-cel");
    const banners = await res.json();

    const tabela = document.getElementById("tabela");

    tabela.innerHTML = "";

    banners.forEach((b, i) => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td><img src="${b.src}"></td>
            <td>${i + 1}</td>
            <td>
                <button class="btn" onclick="mover(${i}, 'cima')">↑</button>
                <button class="btn" onclick="mover(${i}, 'baixo')">↓</button>
                <button class="btn remover" onclick="remover(${i})">X</button>
            </td>
        `;

        tabela.appendChild(tr);
    });
}

// =============================
// REMOVER
// =============================
async function remover(index) {

    const res = await fetch("/remover-banner-cel", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ index })
    });

    const data = await res.json();

    if (data.sucesso) carregarTabela();
}

// =============================
// MOVER
// =============================
async function mover(index, direcao) {

    const res = await fetch("/mover-banner-cel", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ index, direcao })
    });

    const data = await res.json();

    if (data.sucesso) carregarTabela();
}

// INIT
carregarGaleria();
carregarTabela();
</script>

</body>
</html>
