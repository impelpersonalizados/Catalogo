<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Editor de Banners</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }

        .galeria img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 14px;
            cursor: pointer;
            border: 4px solid transparent;
            background: white;
        }

        .galeria img.selecionada {
            border-color: #000000;
        }

        .painel {
            max-width: 500px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #c9adfa;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .tabela-wrap {
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .tabela-wrap h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        td img {
            width: 180px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .btn-tabela {
            padding: 8px 12px;
            margin: 3px;
            border: none;
            border-radius: 8px;
            background: #c9adfa;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-remover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Editor de Banners</h1>

    <div class="galeria" id="galeriaBanners"></div>

    <div class="painel">
        <button onclick="salvarBanner()">
            Adicionar banner selecionado
        </button>
    </div>

    <div class="tabela-wrap">

        <h2>Banners cadastrados</h2>

        <table>
            <thead>
                <tr>
                    <th>Banner</th>
                    <th>Ordem</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaBanners"></tbody>
        </table>

    </div>

    <script>
        let bannerSelecionado = "";

        async function carregarBanners() {
            const resposta = await fetch("/api/banners");
            const banners = await resposta.json();

            const galeria = document.getElementById("galeriaBanners");

            banners.forEach(nome => {
                const img = document.createElement("img");

                img.src = `/banner/${nome}`;

                img.onclick = () => {
                    document.querySelectorAll(".galeria img")
                        .forEach(i => i.classList.remove("selecionada"));

                    img.classList.add("selecionada");

                    bannerSelecionado = nome;
                };

                galeria.appendChild(img);
            });
        }

        async function salvarBanner() {
            if (!bannerSelecionado) {
                alert("Selecione um banner!");
                return;
            }

            const resposta = await fetch("/salvar-banner", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    imagem: bannerSelecionado
                })
            });

            const data = await resposta.json();

            if (data.sucesso) {
                alert("Banner adicionado com sucesso!");
                carregarBannersCadastrados();
            } else {
                alert("Erro ao adicionar banner");
            }
        }

        async function carregarBannersCadastrados() {
            const resposta = await fetch("/api/banners-cadastrados");
            const banners = await resposta.json();

            const tabela = document.getElementById("tabelaBanners");

            tabela.innerHTML = "";

            banners.forEach((banner, index) => {
                const tr = document.createElement("tr");

                tr.innerHTML = `
            <td>
                <img src="${banner.src}">
            </td>

            <td>
                ${index + 1}
            </td>

            <td>
                <button class="btn-tabela" onclick="moverBanner(${index}, 'cima')">
                    ↑ Subir
                </button>

                <button class="btn-tabela" onclick="moverBanner(${index}, 'baixo')">
                    ↓ Descer
                </button>

                <button class="btn-tabela btn-remover" onclick="removerBanner(${index})">
                    Remover
                </button>
            </td>
        `;

                tabela.appendChild(tr);
            });
        }

        async function removerBanner(index) {
            const confirmar = confirm("Deseja remover este banner?");

            if (!confirmar) return;

            const resposta = await fetch("/remover-banner", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ index })
            });

            const data = await resposta.json();

            if (data.sucesso) {
                alert("Banner removido!");
                carregarBannersCadastrados();
            } else {
                alert("Erro ao remover banner");
            }
        }

        async function moverBanner(index, direcao) {
            const resposta = await fetch("/mover-banner", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    index,
                    direcao
                })
            });

            const data = await resposta.json();

            if (data.sucesso) {
                carregarBannersCadastrados();
            } else {
                alert("Erro ao mover banner");
            }
        }

        carregarBanners();
        carregarBannersCadastrados();
    </script>

</body>

</html>
