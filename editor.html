<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Produtos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            color: #111;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* GALERIA */

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .galeria img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            background: #fff;
        }

        .galeria img:hover {
            transform: scale(1.03);
        }

        .galeria img.selecionada {
            border: 3px solid #c9adfa;
        }

        /* FORM */

        .form {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 450px;
            margin: auto;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        .form input:focus {
            border-color: #c9adfa;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #c9adfa;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .resultado {
            margin-top: 30px;
            background: #111;
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-wrap;
            font-size: 13px;
            max-width: 700px;
            margin-inline: auto;
            display: none;
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            color: #777;
        }

        /* TABELA */

        .tabela-wrap {
            margin-top: 40px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .tabela-title {

            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            background: #c9adfa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #fafafa;
        }

        td img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        .input-tabela {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn-atualizar {
            background: #111;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-atualizar:hover {
            opacity: 0.9;
        }

        /* SELECT DE CATEGORIA */

        .form select {
            width: 100%;
            padding: 12px 14px;

            border: 1px solid #ddd;
            border-radius: 10px;

            font-size: 15px;
            font-family: inherit;

            background: white;
            color: #111;

            outline: none;
            cursor: pointer;

            transition: 0.2s;
        }

        .form select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;

            background-image: url("https://cdn-icons-png.flaticon.com/512/32/32195.png");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 12px;

            padding-right: 35px;
        }

        /* FOCO */

        .form select:focus {
            border-color: #c9adfa;
            box-shadow: 0 0 0 2px rgba(201, 173, 250, 0.2);
        }

        /* HOVER */

        .form select:hover {
            border-color: #c9adfa;
        }

        .input-tabela select,
        select.input-tabela {
            width: 100%;
            padding: 8px;

            border: 1px solid #ddd;
            border-radius: 8px;

            background: white;

            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>🛒 Editor de Produtos</h1>

    <div class="status" id="status">
        Carregando imagens...
    </div>

    <div class="galeria" id="galeria"></div>

    <div class="form">

        <input type="text" id="nome" placeholder="Nome do produto">

        <textarea id="descricao" placeholder="Descrição (usada na busca)" style="
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            margin-bottom:12px;
            resize: vertical;
            font-size:14px;
        "></textarea>

        <input type="text" id="valor" placeholder="Valor (ex: 29,90)">

        <input type="text" id="descontoPix" placeholder="Desconto no Pix (ex: 10% ou deixe vazio)">

        <input type="text" id="oferta" placeholder="Oferta/desconto (ex: Em oferta, 20% OFF ou deixe vazio)">

        <input type="text" id="parcelas" placeholder="Parcelamento (ex: 3x sem juros)">

        <select id="categoria">
            <option value="">Selecione uma categoria</option>
        </select>

        <button onclick="salvarProduto()">
            Salvar Produto
        </button>

        <button onclick="corrigirProdutosAntigos()">
            Corrigir produtos antigos
        </button>


    </div>

    <div class="resultado" id="resultado"></div>

    <div class="tabela-wrap">

        <div class="tabela-title">
            Produtos cadastrados
        </div>

        <table>

            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Categoria</th>
                    <th>Pix</th>
                    <th>Oferta</th>
                    <th>Parcelas</th>
                    <th>Imagem</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="tabelaProdutos">

            </tbody>

        </table>

    </div>

    <div class="tabela-wrap">

        <div class="tabela-title">
            Categorias
        </div>

        <div style="padding: 15px; display: flex; gap: 10px;">
            <input type="text" id="novaCategoria" placeholder="Nova categoria" class="input-tabela">

            <button type="button" class="btn-atualizar" onclick="salvarCategoria()">
                Adicionar
            </button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Categoria</th>
                    <th>Ordem</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaCategorias"></tbody>
        </table>

    </div>

    <script>

        let imagensSelecionadas = [];
        let imagemEdicao = {};

        const galeria = document.getElementById("galeria");
        const resultado = document.getElementById("resultado");
        const statusTexto = document.getElementById("status");
        const tabelaProdutos = document.getElementById("tabelaProdutos");

        const tabelaCategorias = document.getElementById("tabelaCategorias");

        // =========================
        // CARREGAR IMAGENS
        // =========================

        async function carregarImagens() {

            try {

                const resposta = await fetch("/api/imagens");

                const imagens = await resposta.json();

                window.listaImagens = imagens;

                statusTexto.innerHTML = "";

                imagens.forEach(nome => {

                    const img = document.createElement("img");

                    img.src = `/thumbs/${nome}`;
                    img.dataset.full = `/img/${nome}`;
                    img.classList.add("img-galeria");
                    img.loading = "lazy";

                    img.onclick = () => {
                        const nomeImagem = nome;

                        if (imagensSelecionadas.includes(nomeImagem)) {
                            imagensSelecionadas = imagensSelecionadas.filter(img => img !== nomeImagem);
                            img.classList.remove("selecionada");
                        } else {
                            imagensSelecionadas.push(nomeImagem);
                            img.classList.add("selecionada");
                        }
                    };

                    galeria.appendChild(img);

                });

            } catch (erro) {

                console.error(erro);

                statusTexto.innerHTML = "Erro ao carregar imagens ❌";

            }

        }

        // =========================
        // SALVAR PRODUTO
        // =========================

        async function salvarProduto() {

            const nome = document.getElementById("nome").value.trim();
            const descricao = document.getElementById("descricao").value.trim();
            const valor = document.getElementById("valor").value.trim();
            const categoria = document.getElementById("categoria").value;
            const descontoPix = document.getElementById("descontoPix").value.trim();
            const oferta = document.getElementById("oferta").value.trim();
            const parcelas = document.getElementById("parcelas").value.trim();
            document.getElementById("descricao").value = "";

            if (imagensSelecionadas.length === 0) {
                alert("Selecione pelo menos uma imagem!");
                return;
            }

            if (!nome || !valor) {
                alert("Preencha os campos!");
                return;
            }

            try {

                const resposta = await fetch("/salvar-produto", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        nome,
                        valor,
                        imagem: imagensSelecionadas[0],
                        imagens: imagensSelecionadas,
                        descontoPix,
                        oferta,
                        parcelas,
                        categoria,
                        descricao,
                    })
                });

                const data = await resposta.json();

                resultado.style.display = "block";

                resultado.innerHTML = `
Produto salvo com sucesso 🚀

Nome: ${nome}
Valor: R$ ${valor}
Imagem: ${imagensSelecionadas.join(", ")}
        `;

                document.getElementById("nome").value = "";
                document.getElementById("valor").value = "";
                document.getElementById("categoria").value = "";
                document.getElementById("descontoPix").value = "";
                document.getElementById("oferta").value = "";
                document.getElementById("parcelas").value = "";

                imagensSelecionadas = [];

                document.querySelectorAll('.galeria img')
                    .forEach(i => i.classList.remove('selecionada'));

                carregarProdutos();

            } catch (erro) {

                resultado.style.display = "block";

                resultado.innerHTML = "Erro ao salvar produto ❌";

            }

        }

        // =========================
        // CARREGAR PRODUTOS
        // =========================

        async function carregarProdutos() {

            tabelaProdutos.innerHTML = "";

            try {

                const resposta = await fetch("/api/produtos");

                const produtos = await resposta.json();

                produtos.forEach((produto, index) => {

                    const tr = document.createElement("tr");

                    tr.innerHTML = `
   <td>
       <div style="display:flex; gap:5px; flex-wrap:wrap;">
    ${(produto.imagens || [produto.imagem]).map(img => `
        <img 
              src="/thumbs/${img}" 
              style="
                    width:50px;
                    height:50px;
                    object-fit:cover;
                   border-radius:8px;
                    border:1px solid #ddd;
                 "
              >
            `).join("")}
        </div>
         <input 
            type="hidden" 
            class="imagens-atuais" 
         value="${(produto.imagens || [produto.imagem]).join('|')}"
        >
    </td>

    <td>
        <input
            type="text"
            class="input-tabela nome-produto"
            value="${produto.nome || ''}"
        >
    </td>

    <td>
    <textarea
            class="input-tabela descricao-produto"
            placeholder="Descrição para busca"
            style="min-height:70px; resize:vertical;"
        >${produto.descricao || ''}</textarea>
    </td>

    <td>
        <input
            type="text"
            class="input-tabela valor-produto"
           value="${produto.valor || produto.preco || produto.precoProduto || ''}"
        >
    </td>

    <td>
       <select class="input-tabela categoria-produto">
          ${gerarOptionsCategoria(produto.categoria)}
       </select>
    </td>

    <td>
        <input
            type="text"
            class="input-tabela pix-produto"
            value="${produto.descontoPix || ''}"
            placeholder="Ex: 10%"
        >
    </td>

    <td>
        <input
            type="text"
            class="input-tabela oferta-produto"
            value="${produto.oferta || ''}"
            placeholder="Ex: Em oferta"
        >
    </td>

    <td>
        <input
            type="text"
            class="input-tabela parcelas-produto"
            value="${produto.parcelas || ''}"
            placeholder="Ex: 3x sem juros"
        >
    </td>

    <td>
        <button
            class="btn-atualizar"
            onclick="selecionarImagemProduto(${index})"
        >
            Usar foto selecionada
        </button>
    </td>

    <td>
        <button
            class="btn-atualizar"
            onclick="atualizarProduto(${index})"
        >
            Atualizar
        </button>

        <button
            class="btn-remover"
            onclick="removerProduto(${index})"
            style="background:#ef4444; margin-top:6px;"
        >
            Remover
        </button>
    </td>
`;

                    tabelaProdutos.appendChild(tr);

                });

            } catch (erro) {

                console.error(erro);

            }

        }

        async function corrigirProdutosAntigos() {

            const confirmar = confirm(
                "Deseja corrigir todos os produtos antigos?"
            );

            if (!confirmar) return;

            const res = await fetch("/corrigir-produtos-antigos", {
                method: "POST"
            });

            const dados = await res.json();

            if (dados.sucesso) {

                alert(`Produtos corrigidos: ${dados.corrigidos}`);

                location.reload();

            } else {

                alert("Erro ao corrigir.");

            }
        }

        // =========================
        // ATUALIZAR PRODUTO
        // =========================

        function selecionarImagemProduto(index) {

            if (imagensSelecionadas.length === 0) {

                alert("Selecione uma ou mais imagens na galeria!");

                return;

            }

            imagemEdicao[index] = [...imagensSelecionadas];

            alert("Imagens selecionadas para este produto 🚀");

        }

        async function atualizarProduto(index) {

            const linhas = document.querySelectorAll("#tabelaProdutos tr");

            const linha = linhas[index];

            const nome = linha.querySelector(".nome-produto").value;
            const descricao = linha.querySelector(".descricao-produto").value;
            const valor = linha.querySelector(".valor-produto").value;
            const categoria = linha.querySelector(".categoria-produto").value;
            const descontoPix = linha.querySelector(".pix-produto").value;
            const oferta = linha.querySelector(".oferta-produto").value;
            const parcelas = linha.querySelector(".parcelas-produto").value;

            const imagemAtual = linha
                .querySelector(".imagens-atuais")
                .value
                .split("|")
                .filter(Boolean);

            const imagens = imagemEdicao[index] || imagemAtual;

            try {

                const resposta = await fetch("/atualizar-produto", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        index,
                        nome,
                        descricao,
                        valor,
                        imagem: imagens[0],
                        imagens,
                        descontoPix,
                        oferta,
                        parcelas,
                        categoria
                    })
                });

                const data = await resposta.json();

                alert("Produto atualizado 🚀");

            } catch (erro) {

                console.error(erro);

                alert("Erro ao atualizar ❌");

            }

        }

        async function removerProduto(index) {

            const confirmar = confirm("Deseja remover este produto?");

            if (!confirmar) return;

            try {

                const resposta = await fetch("/remover-produto", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({ index })

                });

                const data = await resposta.json();

                if (data.sucesso) {

                    alert("Produto removido 🚀");

                    carregarProdutos();

                } else {

                    alert("Erro ao remover");

                }

            } catch (erro) {

                console.error(erro);

                alert("Erro ❌");

            }

        }

        async function iniciar() {

            await carregarImagens();
            await carregarCategorias();
            await carregarMenuPreview();
            await carregarProdutos();

        }

        document.addEventListener("mouseover", (e) => {

            if (e.target.classList.contains("img-galeria")) {

                const img = e.target;
                const imagemCompleta = img.dataset.full;

                if (imagemCompleta) {
                    img.src = imagemCompleta;
                }

            }

        });

        iniciar();

        async function carregarCategorias() {
            const resposta = await fetch("/api/categorias");
            const categorias = await resposta.json();
            window.listaCategorias = categorias;

            const select = document.getElementById("categoria");

            select.innerHTML = `
        <option value="">Selecione uma categoria</option>
    `;

            tabelaCategorias.innerHTML = "";

            categorias.forEach((cat, index) => {
                const option = document.createElement("option");

                option.value = cat;
                option.textContent = cat;

                select.appendChild(option);

                const tr = document.createElement("tr");

                tr.innerHTML = `
            <td>${cat}</td>

            <td>${index + 1}</td>

            <td>
                <button class="btn-atualizar" onclick="moverCategoria(${index}, 'cima')">
                    ↑
                </button>

                <button class="btn-atualizar" onclick="moverCategoria(${index}, 'baixo')">
                    ↓
                </button>

                <button
                    class="btn-remover"
                    onclick="removerCategoria(${index})"
                    style="background:#ef4444; margin-top:6px;"
                >
                    Remover
                </button>
            </td>
        `;

                tabelaCategorias.appendChild(tr);
            });
        }

        async function salvarCategoria() {
            const input = document.getElementById("novaCategoria");
            const categoria = input.value.trim();

            if (!categoria) {
                alert("Digite o nome da categoria");
                return;
            }

            await fetch("/salvar-categoria", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ categoria })
            });

            input.value = "";

            await carregarCategorias();

            alert("Categoria adicionada!");
        }

        async function removerCategoria(index) {
            const confirmar = confirm("Deseja remover esta categoria?");

            if (!confirmar) return;

            const resposta = await fetch("/remover-categoria", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ index })
            });

            const data = await resposta.json();

            if (data.sucesso) {
                alert("Categoria removida!");
                await carregarCategorias();
            } else {
                alert("Erro ao remover categoria");
            }
        }

        async function moverCategoria(index, direcao) {
            const resposta = await fetch("/mover-categoria", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ index, direcao })
            });

            const data = await resposta.json();

            if (data.sucesso) {
                await carregarCategorias();
            } else {
                alert("Erro ao mover categoria");
            }
        }

        async function carregarMenuPreview() {

            const res = await fetch("/api/categorias");
            const categorias = await res.json();

            console.log("Categorias cadastradas:", categorias);
        }

        function normalizarTexto(texto) {
            return (texto || "")
                .toString()
                .trim()
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
        }

        function gerarOptionsCategoria(categoriaAtual) {
            if (!window.listaCategorias) return "";

            const categoriaNormalizada = normalizarTexto(categoriaAtual);

            return window.listaCategorias.map(cat => {
                const selecionado =
                    normalizarTexto(cat) === categoriaNormalizada ? "selected" : "";

                return `<option value="${cat}" ${selecionado}>${cat}</option>`;
            }).join("");
        }

    </script>

</body>

</html>
